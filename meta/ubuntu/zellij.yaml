---
name: zellij
mmdebstrap:
  packages:
    - curl
    - tar
    - ca-certificates
  customize-hooks:
    - |
      chroot "$1" bash -c '
        echo "Installing Zellij from GitHub releases..."
        LATEST_URL=$(curl -s https://api.github.com/repos/zellij-org/zellij/releases/latest | grep "browser_download_url.*aarch64-unknown-linux-musl.tar.gz" | cut -d "\"" -f 4)
        if [ -z "$LATEST_URL" ]; then
          echo "ERROR: Could not find Zellij download URL"
          exit 1
        fi
        curl -L "$LATEST_URL" | tar -xz -C /usr/local/bin
        chmod +x /usr/local/bin/zellij
        zellij --version
      '
