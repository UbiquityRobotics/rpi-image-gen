---
name: zellij
mmdebstrap:
  packages:
    - curl
    - tar
    - ca-certificates
  customize-hooks:
    - |
      chroot "$1" bash -c '
        echo "Installing Zellij from GitHub releases..."
        LATEST_URL=$(curl -fsSL https://api.github.com/repos/zellij-org/zellij/releases/latest \
          | sed -n "s/.*\"browser_download_url\":[[:space:]]*\"\([^\"]*aarch64-unknown-linux-musl\\.tar\\.gz\)\".*/\1/p" \
          | head -n 1)
        if [ -z "$LATEST_URL" ]; then
          echo "ERROR: Could not find Zellij download URL"
          exit 1
        fi

        tmpdir=$(mktemp -d)
        trap "rm -rf \"$tmpdir\"" EXIT

        curl -fL "$LATEST_URL" -o "$tmpdir/zellij.tar.gz"
        tar -xzf "$tmpdir/zellij.tar.gz" -C "$tmpdir"

        if [ ! -f "$tmpdir/zellij" ]; then
          echo "ERROR: Zellij binary not found in release archive"
          exit 1
        fi

        install -m 0755 "$tmpdir/zellij" /usr/local/bin/zellij
        zellij --version
      '
