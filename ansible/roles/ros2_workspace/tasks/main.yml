---
- name: Ensure workspace src directory exists with correct ownership
  ansible.builtin.file:
    path: "{{ ros2_ws }}/src"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Clone git repositories
  become_user: "{{ target_user }}"
  ansible.builtin.git:
    repo: "https://github.com/UbiquityRobotics/{{ item.name }}.git"
    dest: "{{ ros2_ws }}/src/{{ item.name }}"
    version: "{{ item.version }}"
    recursive: "{{ item.recursive | default(false) }}"
    accept_hostkey: true
    force: true
  loop:
    - { name: 'robot_bringup', version: 'master' }
    - { name: 'magni_robot', version: 'fix-tf-remappings' }
    - { name: 'ubiquity_core_utils', version: 'master' }
    - { name: 'iris_ur_lama', version: 'jazzy-devel' }
    - { name: 'iris_ur_lama_ros', version: 'jazzy-devel' }
    - { name: 'ubiquity_motor_ros2', version: 'jazzy-devel' }
    - { name: 'fiducials', version: 'jazzy-devel' }
    - { name: 'lidar_ros2', version: 'jazzy-devel' }
    - { name: 'move_smooth', version: 'jazzy-devel' }
    - { name: 'ubiquity_route_manager', version: 'master' }
    - { name: 'ubiquity_route_msgs', version: 'master' }
    - { name: 'ezpkg_grid_driving_ros2', version: 'jazzy-devel' }
    - { name: 'ezmap', version: 'refactor/modular-arch', recursive: true }

- name: Copy older out-of-tree repositories to the workspace
  become_user: "{{ target_user }}"
  ansible.builtin.copy:
    src: "/opt/ros2_ws/src/{{ item }}/"
    dest: "{{ ros2_ws }}/src/{{ item }}/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: preserve
  ignore_errors: true
  loop:
    - camera_ros
    - ldlidar_stl_ros2
    - magni_bringup
    - oled_display_node
    - ros2_pigpio
    - ROS2Pi_sonar

- name: Remove 1.5708 rotation offset from map_manipulator.js
  become_user: "{{ target_user }}"
  ansible.builtin.replace:
    path: "{{ ros2_ws }}/src/ezmap/ezpkg_map_screen/public/map_manipulator.js"
    regexp: '\+ 1\.5708'
    replace: ''
  ignore_errors: true

- name: Ensure float() cast in map_web_worker_node.py
  become_user: "{{ target_user }}"
  ansible.builtin.replace:
    path: "{{ ros2_ws }}/src/ezmap/ezpkg_map_screen/ezpkg_map_screen/map_web_worker_node.py"
    regexp: 'lid\.ranges\.append\(arr\[0\]\)'
    replace: 'lid.ranges.append(float(arr[0]))'
  ignore_errors: true

- name: Build route_select_ui touchscreen web app
  become_user: "{{ target_user }}"
  ansible.builtin.command:
    cmd: "{{ item }}"
    chdir: "{{ ros2_ws }}/src/ezmap/route_select_ui/route_select_ui/web_app"
  ignore_errors: true
  loop:
    - npm install
    - npm run build

- name: Check if rosdep has been initialized
  ansible.builtin.stat:
    path: /etc/ros/rosdep/sources.list.d/20-default.list
  register: rosdep_init_stat

- name: Initialize rosdep
  ansible.builtin.command:
    cmd: rosdep init
  when: not rosdep_init_stat.stat.exists

- name: Update rosdep
  become_user: "{{ target_user }}"
  ansible.builtin.command:
    cmd: rosdep update --include-eol-distros
  register: rosdep_update_res
  until: rosdep_update_res.rc == 0
  retries: 5
  delay: 5

- name: Install ROS workspace system dependencies via rosdep
  ansible.builtin.command:
    cmd: "rosdep install --from-paths {{ ros2_ws }}/src --ignore-src -y -r --rosdistro {{ ros_distro }} --skip-keys='libcamera dynamic_reconfigure catkin tf roscpp'"

- name: Create COLCON_IGNORE in non-ROS packages to prevent colcon compilation
  become_user: "{{ target_user }}"
  ansible.builtin.file:
    path: "{{ ros2_ws }}/src/{{ item }}/COLCON_IGNORE"
    state: touch
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  ignore_errors: true
  loop:
    - libcamera
    - libpisp

- name: Compile ROS 2 workspace with colcon
  become_user: "{{ target_user }}"
  ansible.builtin.command:
    cmd: "/bin/bash -c 'source /opt/ros/{{ ros_distro }}/setup.bash && colcon build --symlink-install'"
    chdir: "{{ ros2_ws }}"

- name: Ensure robot_bringup config directory exists in install space
  ansible.builtin.file:
    path: "{{ ros2_ws }}/install/robot_bringup/share/robot_bringup/config"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Symlink IMX219 camera calibration to robot_bringup config
  ansible.builtin.file:
    src: "{{ target_user_home }}/.ros/camera_info/imx219__base_axi_pcie_1000120000_rp1_i2c_88000_imx219_10_640x480.yaml"
    dest: "{{ ros2_ws }}/install/robot_bringup/share/robot_bringup/config/camera_info.yaml"
    state: link
    force: true

- name: Ensure ROS 2 workspace is sourced in target user bashrc
  become_user: "{{ target_user }}"
  ansible.builtin.lineinfile:
    path: "{{ target_user_home }}/.bashrc"
    line: "source {{ ros2_ws }}/install/setup.bash"
    state: present
    create: true
    mode: '0644'
