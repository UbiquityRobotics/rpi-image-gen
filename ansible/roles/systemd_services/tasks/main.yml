---
- name: Deploy hardware.service systemd unit
  ansible.builtin.template:
    src: hardware.service.j2
    dest: /etc/systemd/system/hardware.service
    mode: '0644'

- name: Deploy navigation.service systemd unit
  ansible.builtin.template:
    src: navigation.service.j2
    dest: /etc/systemd/system/navigation.service
    mode: '0644'

- name: Deploy ui.service systemd unit
  ansible.builtin.template:
    src: ui.service.j2
    dest: /etc/systemd/system/ui.service
    mode: '0644'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable Magni orchestrator services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - hardware.service
    - navigation.service
    - ui.service
