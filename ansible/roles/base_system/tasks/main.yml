---
- name: Install system package dependencies
  ansible.builtin.apt:
    name:
      - curl
      - git
      - gpiod
      - whiptail
      - systemd-resolved
      - network-manager
      - locales
      - fake-hwclock
      - cloud-guest-utils
      - parted
      - plocate
      - build-essential
      - python3-pip
      - python3-setuptools
      - nodejs
      - npm
      - python3-colcon-common-extensions
      - python3-vcstool
      - ros-dev-tools
      # Camera ROS dependencies
      - libjpeg-dev
      - libavcodec-dev
      - libavdevice-dev
      - libavfilter-dev
      - libavformat-dev
      - libavutil-dev
      - libdrm-dev
      - libexif-dev
      - libtiff-dev
      - libudev-dev
      - libv4l-dev
      - libyaml-cpp-dev
      - libgstreamer1.0-dev
      - libgstreamer-plugins-base1.0-dev
      - libglib2.0-dev
      - python3-colcon-meson
      - meson
      - ninja-build
      # ROS 2 Jazzy packages
      - ros-jazzy-ros-base
      - ros-jazzy-desktop
      - ros-jazzy-rmw-zenoh-cpp
      - ros-jazzy-ament-cmake
      - ros-jazzy-rviz-visual-tools
      - ros-jazzy-vision-msgs
      - ros-jazzy-image-transport
      - ros-jazzy-camera-info-manager
      - ros-jazzy-image-pipeline
      - ros-jazzy-nav2-map-server
      - ros-jazzy-gps-umd
      - libpcl-dev
      - ros-jazzy-pcl-conversions
      - libpcap-dev
      - ros-jazzy-rosbridge-server
      - ros-jazzy-tf-transformations
      - ros-jazzy-nav2-msgs
      - ros-jazzy-nav2-util
      - ros-jazzy-controller-manager
      - ros-jazzy-joint-state-publisher
      - ros-jazzy-xacro
      - ros-jazzy-ros2-control
      - ros-jazzy-ros2-controllers
    state: present
    update_cache: true

- name: Configure limits.conf for real-time priority of target user
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "{{ target_user }}          -       nice            -20"
    state: present
    create: true
    mode: '0644'

- name: Add target user to groups
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups:
      - dialout
      - video
    append: true
